spring:
  application:
    name: bodega-gestion

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bodega_gestion}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api/v1

supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  anon-key: ${SUPABASE_ANON_KEY:your-anon-key}
  jwt-secret: ${SUPABASE_JWT_SECRET:your-jwt-secret}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:your-service-role-key}

logging:
  level:
    com.bodega.gestion: DEBUG
    org.springframework.security: INFO